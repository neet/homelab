---
# このファイルは以下のコマンドで暗号化してください:
# ansible-vault encrypt group_vars/vault.yml
#
# 編集する場合:
# ansible-vault edit group_vars/vault.yml

# Sambaパスワード
samba_password: "your_samba_password_here"

# msmtp設定
msmtp_from: "your_email@gmail.com"
msmtp_user: "your_email@gmail.com"
msmtp_password: "your_gmail_app_password_here"

# ZED通知先メールアドレス
zed_email_addr: "your_email@gmail.com"
