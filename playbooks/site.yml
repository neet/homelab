- name: Data Store
  hosts: store
  roles:
    - avahi
    - samba
    - msmtp
    - zed
    - nfs_server

- name: Hosting Immich + Gateway
  hosts: compute
  roles:
    - avahi
    - geerlingguy.docker
    - nfs_client
    - immich
    - cloudflared
  # https://github.com/geerlingguy/ansible-role-docker/issues/490
  become: true
