- name: Ensure msmtp and related packages are installed
  become: yes
  ansible.builtin.apt:
    update_cache: yes
    name:
      - msmtp
      - msmtp-mta

- name: Ensure msmtp is updated
  become: yes
  ansible.builtin.template:
    src: msmtprc.j2
    dest: /etc/msmtprc

- name: Ensure msmtp is enabled
  become: yes
  ansible.builtin.service:
    name: msmtpd
    enabled: yes 
    state: started

